<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>NewsCraft AI</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="container">

        <h1>📰 NewsCraft AI</h1>

        <p>
            Generator Berita Berbasis Google Gemini
        </p>

        <form id="newsForm">

            <label>Judul Berita</label>

            <input
                type="text"
                id="judul"
                placeholder="Masukkan judul berita">

            <label>Deskripsi Peristiwa</label>

            <textarea
                id="deskripsi"
                rows="6"
                placeholder="Tuliskan deskripsi singkat mengenai peristiwa..."></textarea>

            <label>Jenis Berita</label>

            <select id="kategori">

                <option>Pendidikan</option>

                <option>Teknologi</option>

                <option>Olahraga</option>

                <option>Sosial</option>

                <option>Politik</option>

            </select>

            <label>Gaya Penulisan</label>

            <select id="gaya">

                <option>Jurnalistik</option>

                <option>Formal</option>

                <option>Santai</option>

            </select>

            <label>Panjang Berita</label>

            <div class="radio-group">

                <label>
                    <input
                        type="radio"
                        name="panjang"
                        value="Pendek"
                        checked>

                    Pendek
                </label>

                <label>
                    <input
                        type="radio"
                        name="panjang"
                        value="Sedang">

                    Sedang
                </label>

                <label>
                    <input
                        type="radio"
                        name="panjang"
                        value="Panjang">

                    Panjang
                </label>

            </div>

            <button type="submit">

                Generate Berita

            </button>

        </form>

    </div>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/script.js"></script>

</body>

</html>
